<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="今日も、あてなく歩こう。ランダムにチェーン店を選んで歩くPWAアプリ">
  <meta name="theme-color" content="#BA7517">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>彷徨える胃袋</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Zen+Antique&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       CSS Custom Properties / Design System
       ============================================ */
    :root {
      --bg: #1A1814;
      --bg2: #26241F;
      --bg3: #332F28;
      --amber: #FAC775;
      --amber-dark: #BA7517;
      --amber-deep: #412402;
      --amber-glow: rgba(250, 199, 117, 0.15);
      --text-muted: #888780;
      --white: #FFFFFF;
      --error: #E74C3C;
      --success: #2ECC71;
    }

    /* ============================================
       Reset & Base
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================
       Screen Management
       ============================================ */
    .screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 1;
    }

    .screen.active {
      display: flex;
    }

    /* ============================================
       Shared Components
       ============================================ */
    .button {
      background: var(--amber-dark);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s;
    }

    .button:active::after {
      width: 300px;
      height: 300px;
    }

    .button:hover {
      background: #D68A1C;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(186, 117, 23, 0.4);
    }

    .button:active {
      transform: translateY(0);
      background: #A66314;
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .button-full {
      width: 100%;
    }

    .button-outline {
      background: transparent;
      border: 2px solid var(--amber-dark);
      color: var(--amber);
    }

    .button-outline:hover {
      background: var(--amber-deep);
    }

    .card {
      background: var(--bg2);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(250, 199, 117, 0.08);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      background: var(--bg2);
      color: var(--white);
      border: 1px solid rgba(186, 117, 23, 0.4);
      border-radius: 24px;
      padding: 8px 18px;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--amber);
    }

    .chip.selected {
      background: var(--amber-deep);
      border-color: var(--amber);
      color: var(--amber);
      box-shadow: 0 0 12px rgba(250, 199, 117, 0.15);
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bg2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--amber-dark), var(--amber));
      border-radius: 4px;
      transition: width 0.5s ease;
      min-width: 0%;
    }

    .metric-card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border: 1px solid rgba(250, 199, 117, 0.05);
    }

    .metric-label {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .metric-value {
      color: var(--amber);
      font-size: 32px;
      font-family: 'Zen Antique', serif;
      font-weight: 600;
      line-height: 1.2;
    }

    .metric-unit {
      color: var(--text-muted);
      font-size: 14px;
      margin-left: 2px;
    }

    /* ============================================
       1. Setup Screen
       ============================================ */
    #setup-screen {
      background: var(--bg);
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
    }

    .setup-container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .setup-icon {
      font-size: 80px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .setup-title {
      font-family: 'Zen Antique', serif;
      font-size: 36px;
      color: var(--amber);
      margin-bottom: 8px;
    }

    .setup-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 40px;
    }

    .setup-input-group {
      margin-bottom: 24px;
      text-align: left;
    }

    .setup-input-label {
      display: block;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .setup-input {
      width: 100%;
      background: var(--bg2);
      border: 2px solid var(--bg3);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--white);
      font-size: 14px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.3s;
    }

    .setup-input:focus {
      border-color: var(--amber-dark);
    }

    .setup-info {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 24px;
      text-align: left;
    }

    .setup-info a {
      color: var(--amber);
      text-decoration: none;
    }

    /* ============================================
       2. Top Screen
       ============================================ */
    #top-screen {
      background: var(--bg);
      padding: 0;
    }

    .top-header {
      text-align: center;
      padding: 48px 24px 24px;
      position: relative;
    }

    .top-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--amber-dark), transparent);
      border-radius: 2px;
    }

    .top-title {
      font-family: 'Zen Antique', serif;
      font-size: 28px;
      color: var(--amber);
      margin-bottom: 4px;
    }

    .top-tagline {
      color: var(--text-muted);
      font-size: 13px;
    }

    .top-content {
      padding: 24px;
      flex: 1;
      overflow-y: auto;
    }

    .section-title {
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Walking Time Slider */
    .slider-section {
      margin-bottom: 28px;
    }

    .slider-display {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .slider-time {
      font-family: 'Zen Antique', serif;
      font-size: 40px;
      color: var(--amber);
    }

    .slider-time-unit {
      font-size: 18px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .slider-distance {
      color: var(--text-muted);
      font-size: 14px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: var(--bg2);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(250, 199, 117, 0.5);
      transition: transform 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--amber);
      border: none;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(250, 199, 117, 0.5);
    }

    /* Genre Filter */
    .genre-section {
      margin-bottom: 28px;
    }

    .genre-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Statistics */
    .stats-section {
      margin-bottom: 32px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stats-grid .metric-card {
      padding: 14px 12px;
    }

    .stats-grid .metric-value {
      font-size: 28px;
    }

    /* Start Button */
    .start-section {
      padding: 0 0 40px;
    }

    .start-button {
      width: 100%;
      padding: 20px;
      font-size: 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--amber-dark), #D48B1D);
      box-shadow: 0 4px 24px rgba(186, 117, 23, 0.3);
      letter-spacing: 2px;
    }

    .start-button:hover {
      box-shadow: 0 6px 32px rgba(186, 117, 23, 0.5);
      transform: translateY(-2px);
    }

    .start-button-icon {
      margin-right: 8px;
      font-size: 24px;
    }

    /* ============================================
       3. Loading Screen
       ============================================ */
    #loading-screen {
      background: var(--bg);
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
    }

    .loading-container {
      text-align: center;
    }

    .loading-spinner {
      width: 64px;
      height: 64px;
      margin: 0 auto 32px;
      position: relative;
    }

    .loading-spinner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 4px solid var(--bg2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-spinner::after {
      content: '🍜';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-status {
      color: var(--amber);
      font-size: 16px;
      margin-bottom: 8px;
      min-height: 24px;
    }

    .loading-substatus {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ============================================
       4. Walking Screen
       ============================================ */
    #walking-screen {
      background: var(--bg);
      padding: 0;
    }

    .map-container {
      width: 100%;
      height: 55vh;
      min-height: 300px;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .walking-panel {
      flex: 1;
      padding: 20px 24px;
      position: relative;
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      margin-top: -20px;
      z-index: 2;
      overflow-y: auto;
    }

    .destination-info {
      margin-bottom: 16px;
    }

    .destination-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--white);
    }

    .destination-address {
      color: var(--text-muted);
      font-size: 13px;
    }

    .destination-remaining {
      color: var(--amber);
      font-size: 14px;
      margin-top: 4px;
    }

    .walking-progress {
      margin-bottom: 20px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .progress-text {
      color: var(--text-muted);
      font-size: 12px;
    }

    .progress-percent {
      color: var(--amber);
      font-size: 14px;
      font-family: 'Zen Antique', serif;
    }

    .walking-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .walking-metrics .metric-value {
      font-size: 24px;
    }

    .walking-actions {
      display: flex;
      gap: 12px;
    }

    .reroll-button {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      border-radius: 12px;
    }

    /* ============================================
       5. Arrival Screen
       ============================================ */
    #arrival-screen {
      background: var(--bg);
      padding: 0;
    }

    .arrival-header {
      text-align: center;
      padding: 48px 24px 24px;
    }

    .arrival-congrats {
      font-size: 48px;
      margin-bottom: 8px;
      animation: bounce-in 0.6s ease;
    }

    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .arrival-title {
      font-family: 'Zen Antique', serif;
      font-size: 24px;
      color: var(--amber);
      margin-bottom: 4px;
    }

    .arrival-subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .arrival-content {
      padding: 0 24px 40px;
      flex: 1;
      overflow-y: auto;
    }

    /* Share Card */
    .share-card-container {
      margin-bottom: 24px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .share-card-container img {
      width: 100%;
      display: block;
    }

    /* Stamps */
    .stamps-section {
      margin-bottom: 24px;
    }

    .stamps-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .stamps-count {
      color: var(--amber);
      font-family: 'Zen Antique', serif;
      font-size: 18px;
    }

    .stamps-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stamp {
      background: var(--amber-deep);
      border: 1px solid rgba(250, 199, 117, 0.2);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--amber);
      animation: stamp-in 0.3s ease;
    }

    .stamp.new {
      animation: stamp-glow 1s ease;
      border-color: var(--amber);
    }

    @keyframes stamp-in {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes stamp-glow {
      0% { transform: scale(0); opacity: 0; box-shadow: 0 0 0 var(--amber); }
      50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(250, 199, 117, 0.4); }
      100% { transform: scale(1); opacity: 1; box-shadow: none; }
    }

    .arrival-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .share-button {
      background: #1DA1F2;
      padding: 16px;
      font-size: 16px;
    }

    .share-button:hover {
      background: #1a8cd8;
    }

    .retry-button {
      padding: 16px;
      font-size: 16px;
    }

    /* ============================================
       Error / Warning Toast
       ============================================ */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg2);
      border: 1px solid var(--error);
      color: var(--white);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 9999;
      max-width: 90%;
      text-align: center;
      opacity: 0;
      transition: all 0.4s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.warning {
      border-color: var(--amber-dark);
    }

    .toast-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .toast-message {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ============================================
       Error Modal
       ============================================ */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 24px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg2);
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(250, 199, 117, 0.1);
    }

    .modal-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-message {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* ============================================
       Offline Banner
       ============================================ */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: var(--error);
      color: var(--white);
      text-align: center;
      padding: 8px;
      font-size: 13px;
      z-index: 9999;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }

    .offline-banner.visible {
      transform: translateY(0);
    }

    /* ============================================
       Settings Button
       ============================================ */
    .settings-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      z-index: 10;
      transition: color 0.2s;
    }

    .settings-btn:hover {
      color: var(--amber);
    }

    /* ============================================
       Responsive / Desktop
       ============================================ */
    @media (min-width: 600px) {
      .screen {
        max-width: 430px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 1px solid var(--bg3);
        border-right: 1px solid var(--bg3);
      }
    }
  </style>
</head>
<body>



  <!-- ==========================================
       Top Screen
       ========================================== -->
  <div id="top-screen" class="screen">
    <div class="top-header">
      <h1 class="top-title">彷徨える胃袋</h1>
      <p class="top-tagline">今日も、あてなく歩こう。</p>
    </div>

    <div class="top-content">
      <!-- Walking Time Slider -->
      <div class="slider-section">
        <div class="section-title">🚶 歩行時間</div>
        <div class="slider-display">
          <div>
            <span id="slider-value" class="slider-time">15</span>
            <span class="slider-time-unit">分</span>
          </div>
          <span id="slider-distance" class="slider-distance">約 1,200 m</span>
        </div>
        <input type="range" id="walking-slider" min="5" max="40" value="15" step="1" oninput="updateSlider(this.value)">
      </div>

      <!-- Genre Filter -->
      <div class="genre-section">
        <div class="section-title">🍽️ ジャンル</div>
        <div class="genre-chips" id="genre-chips">
          <span class="chip selected" data-genre="all" onclick="selectGenre(this)">すべて</span>
          <span class="chip" data-genre="convenience" onclick="selectGenre(this)">🏪 コンビニ</span>
          <span class="chip" data-genre="family" onclick="selectGenre(this)">🍽️ ファミレス</span>
          <span class="chip" data-genre="izakaya" onclick="selectGenre(this)">🍺 居酒屋</span>
          <span class="chip" data-genre="ramen" onclick="selectGenre(this)">🍜 ラーメン</span>
          <span class="chip" data-genre="cafe" onclick="selectGenre(this)">☕ カフェ</span>
          <span class="chip" data-genre="burger" onclick="selectGenre(this)">🍔 バーガー</span>
        </div>
      </div>



      <!-- Start Button -->
      <div class="start-section">
        <button class="button start-button" id="start-btn" onclick="startAdventure()">
          <span class="start-button-icon">🍜</span>
          胃袋を解き放つ
        </button>
      </div>
    </div>
  </div>

  <!-- ==========================================
       Loading Screen
       ========================================== -->
  <div id="loading-screen" class="screen">
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div id="loading-status" class="loading-status">現在地を取得中...</div>
      <div id="loading-substatus" class="loading-substatus">少々お待ちください</div>
    </div>
  </div>

  <!-- ==========================================
       Walking Screen
       ========================================== -->
  <div id="walking-screen" class="screen">
    <div class="map-container">
      <div id="map"></div>
    </div>
    <div class="walking-panel">
      <div class="destination-info">
        <div id="dest-name" class="destination-name">---</div>

          <div class="metric-label">距離</div>

        <div class="metric-card">
          <div class="metric-label">カロリー</div>
          <div><span id="walk-calories" class="metric-value">0</span><span class="metric-unit">kcal</span></div>

  <!-- ==========================================
       Arrival Screen
       ========================================== -->
  <div id="arrival-screen" class="screen">
    <div class="arrival-header">
      <div class="arrival-congrats">🎉</div>
      <h1 class="arrival-title">到着おめでとう！</h1>
      <p id="arrival-dest-name" class="arrival-subtitle">---</p>
    </div>

    <div class="arrival-content">
      <div class="share-card-container">
        <img id="share-card-img" src="" alt="シェアカード">
      </div>



      <div class="arrival-actions">
        <button class="button share-button button-full" onclick="shareToX()">
          𝕏 でシェアする
        </button>

  <!-- ==========================================
       Error Modal

      <h2 class="modal-title" id="modal-title">エラー</h2>
      <p class="modal-message" id="modal-message">エラーが発生しました。</p>
      <button class="button button-full" id="modal-btn" onclick="closeModal()">OK</button>

  <!-- ==========================================
       Offline Banner
       ========================================== -->
  <div id="offline-banner" class="offline-banner">
    📡 オフラインです。一部機能が制限されます。
  </div>

  <!-- ==========================================
       Toast
       ========================================== -->
  <div id="toast" class="toast">
    <div class="toast-title" id="toast-title"></div>
    <div class="toast-message" id="toast-message"></div>
  </div>

  <!-- ==========================================
       JavaScript
       ========================================== -->
  <script>
    // ============================================
    // Global State
    // ============================================
    let map = null;
    let userMarker = null;
    let destMarker = null;
    let directionsRenderer = null;
    let selectedGenre = 'all';
    let walkingMinutes = 15;

    let walkingSession = {
      startLocation: null,
      currentLocation: null,
      destination: null,
      route: null,
      distanceTraveled: 0,
      lastPosition: null,
      steps: 0,
      calories: 0,
      progressPercentage: 0,
      watchId: null,
      status: 'inactive'
    };

    // ============================================
    // localStorage Helpers
    // ============================================
    function saveAPIKey(key) {
      localStorage.setItem('apiKey', key);
    }

    function getAPIKey() {
      return localStorage.getItem('apiKey');
    }

    function clearAPIKey() {
      localStorage.removeItem('apiKey');
    }

    function getStatistics() {
      const data = localStorage.getItem('statistics');
      if (data) return JSON.parse(data);
      return { totalDistance: 0, totalSteps: 0, totalCalories: 0, totalSessions: 0 };
    }

    function saveStatistics(stats) {
      stats.lastUpdated = Date.now();
      localStorage.setItem('statistics', JSON.stringify(stats));
    }

    function updateStatisticsFromSession(session) {
      const stats = getStatistics();
      stats.totalDistance += session.distanceTraveled;
      stats.totalSteps += session.steps;
      stats.totalCalories += session.calories;
      stats.totalSessions += 1;
      saveStatistics(stats);
    }

    function getConquestStamps() {
      const data = localStorage.getItem('conquestStamps');
      if (data) return JSON.parse(data);
      return { chains: [], totalUnique: 0 };
    }

    function saveConquestStamps(stamps) {
      localStorage.setItem('conquestStamps', JSON.stringify(stamps));
    }

    function addConquestStamp(chainName) {
      const stamps = getConquestStamps();
      const existing = stamps.chains.find(c => c.name === chainName);
      if (existing) {
        existing.visitCount += 1;
      } else {
        stamps.chains.push({
          name: chainName,
          firstVisit: Date.now(),
          visitCount: 1
        });
        stamps.totalUnique = stamps.chains.length;
      }
      saveConquestStamps(stamps);
      return stamps;
    }

    function savePreferences() {
      localStorage.setItem('preferences', JSON.stringify({
        defaultWalkingMinutes: walkingMinutes,
        defaultGenre: selectedGenre
      }));
    }

    function loadPreferences() {
      const data = localStorage.getItem('preferences');
      if (data) {
        const prefs = JSON.parse(data);
        walkingMinutes = prefs.defaultWalkingMinutes || 15;
        selectedGenre = prefs.defaultGenre || 'all';
      }
    }

    // ============================================
    // Calculation Functions
    // ============================================
    function calculateSearchRadius(minutes) {
      return minutes * 80;
    }

    function calculateSteps(distanceMeters) {
      return Math.round(distanceMeters / 0.75);
    }

    function calculateCalories(distanceMeters) {
      return Math.round((distanceMeters / 1000) * 58.5);
    }

    function calculateProgress(traveled, total) {
      if (total <= 0) return 0;
      return Math.min(100, (traveled / total) * 100);
    }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI / 180;
      const φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;

      const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                Math.cos(φ1) * Math.cos(φ2) *
                Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    function checkArrival(currentLat, currentLng, destLat, destLng) {
      return haversineDistance(currentLat, currentLng, destLat, destLng) < 50;
    }

    function formatDistance(meters) {
      if (meters >= 1000) {
        return (meters / 1000).toFixed(1) + ' km';
      }
      return Math.round(meters) + ' m';
    }

    // ============================================
    // Chain Store Filtering
    // ============================================
    const knownChains = [
      // 牛丼チェーン
      'すき家', '吉野家', '松屋', 'なか卯',
      // コンビニ
      'セブンイレブン', 'セブン-イレブン', 'ファミリーマート', 'ローソン', 'ミニストップ', 'デイリーヤマザキ',
      // カフェ
      'スターバックス', 'ドトール', 'タリーズ', 'コメダ珈琲', 'サンマルクカフェ', 'ベローチェ', 'プロント',
      // バーガー
      'マクドナルド', 'モスバーガー', 'ロッテリア', 'バーガーキング', 'フレッシュネスバーガー', 'ウェンディーズ',
      // ファミレス
      'サイゼリヤ', 'ガスト', 'ジョナサン', 'デニーズ', 'ロイヤルホスト', 'ジョイフル', 'ココス', 'びっくりドンキー', 'バーミヤン',
      // ラーメン
      '天下一品', '一蘭', '日高屋', '幸楽苑', 'リンガーハット', '一風堂', '丸亀製麺',
      // 居酒屋
      '鳥貴族', '魚民', '白木屋', '笑笑', '和民', '鳥メロ', '串カツ田中',
      // その他
      'CoCo壱番屋', 'カレーハウスCoCo壱番屋', 'ケンタッキー', 'KFC',
      '餃子の王将', '大阪王将', 'かつや', '松のや', '天丼てんや',
      'ミスタードーナツ', 'サーティワン', 'ピザーラ', 'ドミノ・ピザ',
      'すし銚子丸', 'くら寿司', 'スシロー', 'はま寿司',
      'COCO\'S', 'Starbucks', 'McDonald\'s', 'Subway', 'KFC'
    ];

    function isKnownChain(name) {
      return knownChains.some(chain => name.includes(chain));
    }

    function matchesChainPattern(name) {
      const katakanaPattern = /[\u30A0-\u30FF]{3,}/;
      const englishPattern = /[A-Z]{2,}/;
      return katakanaPattern.test(name) || englishPattern.test(name);
    }

    function isChainStore(place) {
      const name = place.name;
      return isKnownChain(name) || matchesChainPattern(name);
    }

    const genreKeywords = {
      'all': '',
      'convenience': 'コンビニ',
      'family': 'ファミリーレストラン',
      'izakaya': '居酒屋',
      'ramen': 'ラーメン',
      'cafe': 'カフェ',
      'burger': 'バーガー'
    };

    const genreTypes = {
      'all': 'restaurant',
      'convenience': 'convenience_store',
      'family': 'restaurant',
      'izakaya': 'bar',
      'ramen': 'restaurant',
      'cafe': 'cafe',
      'burger': 'restaurant'
    };

    // ============================================
    // Screen Navigation
    // ============================================
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // ============================================
    // Setup Screen Logic
    // ============================================
    function saveAndProceed() {
      const input = document.getElementById('api-key-input');
      const key = input.value.trim();
      if (!key) {
        showToast('入力エラー', 'APIキーを入力してください。');
        return;
      }
      saveAPIKey(key);
      loadGoogleMapsAPI(key);
      showScreen('top-screen');
      displayStatistics();
    }

    function resetAPIKey() {
      if (confirm('APIキーをリセットしますか？')) {
        clearAPIKey();
        showScreen('setup-screen');
      }
    }

    // ============================================
    // Top Screen Logic
    // ============================================
    function updateSlider(value) {
      walkingMinutes = parseInt(value);
      const radius = calculateSearchRadius(walkingMinutes);
      document.getElementById('slider-value').textContent = walkingMinutes;
      document.getElementById('slider-distance').textContent = '約 ' + radius.toLocaleString() + ' m';
      savePreferences();
    }

    function selectGenre(el) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedGenre = el.dataset.genre;
      savePreferences();
    }

    function displayStatistics() {
      const stats = getStatistics();
      const stamps = getConquestStamps();

      document.getElementById('stat-distance').textContent = (stats.totalDistance / 1000).toFixed(1);
      document.getElementById('stat-steps').textContent = stats.totalSteps.toLocaleString();
      document.getElementById('stat-calories').textContent = stats.totalCalories.toLocaleString();
      document.getElementById('stat-chains').textContent = stamps.totalUnique;
    }

    // ============================================
    // Loading & Adventure Flow
    // ============================================
    function startAdventure() {
      if (!navigator.geolocation) {
        showErrorModal('位置情報非対応', 'このブラウザは位置情報をサポートしていません。');
        return;
      }

      showScreen('loading-screen');
      updateLoadingStatus('現在地を取得中...', '高精度位置情報を使用しています');

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const loc = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          walkingSession.startLocation = loc;
          walkingSession.currentLocation = loc;
          searchChainStores(loc);
        },
        (error) => {
          handleLocationError(error);
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function updateLoadingStatus(status, substatus) {
      document.getElementById('loading-status').textContent = status;
      document.getElementById('loading-substatus').textContent = substatus || '';
    }

    function searchChainStores(location) {
      updateLoadingStatus('チェーン店を検索中...', '半径 ' + calculateSearchRadius(walkingMinutes).toLocaleString() + 'm を探索');

      const mapDiv = document.getElementById('map');
      if (!map) {
        map = new google.maps.Map(mapDiv, {
          center: location,
          zoom: 15,
          disableDefaultUI: true,
          styles: darkModeStyles
        });
      }

      const service = new google.maps.places.PlacesService(map);
      const radius = calculateSearchRadius(walkingMinutes);
      const type = genreTypes[selectedGenre] || 'restaurant';
      const keyword = genreKeywords[selectedGenre] || '';

      const request = {
        location: new google.maps.LatLng(location.lat, location.lng),
        radius: radius,
        type: type
      };

      if (keyword) {
        request.keyword = keyword;
      }

      service.nearbySearch(request, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
          let chainStores = results.filter(isChainStore);

          if (chainStores.length === 0) {
            // fallback: use all results if no chains found
            chainStores = results;
          }

          if (chainStores.length === 0) {
            showErrorModal(
              'チェーン店が見つかりませんでした',
              '検索範囲を広げるか、ジャンルフィルターを変更してみてください。'
            );
            showScreen('top-screen');
            return;
          }

          const dest = chainStores[Math.floor(Math.random() * chainStores.length)];
          walkingSession.destination = {
            placeId: dest.place_id,
            name: dest.name,
            address: dest.vicinity || '',
            location: {
              lat: dest.geometry.location.lat(),
              lng: dest.geometry.location.lng()
            }
          };

          calculateRoute(location, walkingSession.destination.location);
        } else if (status === google.maps.places.PlacesServiceStatus.ZERO_RESULTS) {
          showErrorModal(
            'チェーン店が見つかりませんでした',
            '検索範囲を広げるか、ジャンルフィルターを変更してみてください。'
          );
          showScreen('top-screen');
        } else {
          handleAPIError(status, 'Places');
        }
      });
    }

    function calculateRoute(origin, destination) {
      updateLoadingStatus('ルートを計算中...', walkingSession.destination.name + ' への道を探しています');

      const directionsService = new google.maps.DirectionsService();
      directionsService.route(
        {
          origin: new google.maps.LatLng(origin.lat, origin.lng),
          destination: new google.maps.LatLng(destination.lat, destination.lng),
          travelMode: google.maps.TravelMode.WALKING
        },
        (result, status) => {
          if (status === google.maps.DirectionsStatus.OK) {
            const leg = result.routes[0].legs[0];
            walkingSession.route = {
              distance: leg.distance.value,
              duration: leg.duration.value,
              result: result
            };

            startWalking(result);
          } else {
            handleAPIError(status, 'Directions');
          }
        }
      );
    }

    // ============================================
    // Walking Screen Logic
    // ============================================
    function startWalking(directionsResult) {
      showScreen('walking-screen');

      // Reset session metrics
      walkingSession.distanceTraveled = 0;
      walkingSession.lastPosition = walkingSession.startLocation;
      walkingSession.steps = 0;
      walkingSession.calories = 0;
      walkingSession.progressPercentage = 0;
      walkingSession.status = 'active';

      // Initialize map
      map = new google.maps.Map(document.getElementById('map'), {
        center: walkingSession.startLocation,
        zoom: 15,
        disableDefaultUI: true,
        zoomControl: true,
        styles: darkModeStyles
      });

      // Directions renderer
      if (directionsRenderer) {
        directionsRenderer.setMap(null);
      }
      directionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        suppressMarkers: true,
        polylineOptions: {
          strokeColor: '#BA7517',
          strokeWeight: 5,
          strokeOpacity: 0.8
        }
      });
      directionsRenderer.setDirections(directionsResult);

      // User marker
      userMarker = new google.maps.Marker({
        position: walkingSession.startLocation,
        map: map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#4285F4',
          fillOpacity: 1,
          strokeColor: '#FFFFFF',
          strokeWeight: 3
        },
        zIndex: 10
      });

      // Destination marker
      destMarker = new google.maps.Marker({
        position: walkingSession.destination.location,
        map: map,
        label: {
          text: '🍜',
          fontSize: '24px'
        }
      });

      // Update UI
      document.getElementById('dest-name').textContent = walkingSession.destination.name;
      document.getElementById('dest-address').textContent = walkingSession.destination.address;
      document.getElementById('dest-remaining').textContent = '残り ' + formatDistance(walkingSession.route.distance);

      updateWalkingMetrics();

      // Start tracking
      walkingSession.watchId = navigator.geolocation.watchPosition(
        onPositionUpdate,
        onPositionError,
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
      );
    }

    function onPositionUpdate(position) {
      const newLat = position.coords.latitude;
      const newLng = position.coords.longitude;

      // Calculate distance from last position
      if (walkingSession.lastPosition) {
        const moved = haversineDistance(
          walkingSession.lastPosition.lat,
          walkingSession.lastPosition.lng,
          newLat, newLng
        );

        // Filter out GPS noise (ignore movements < 3m)
        if (moved > 3) {
          walkingSession.distanceTraveled += moved;
          walkingSession.lastPosition = { lat: newLat, lng: newLng };
        }
      }

      walkingSession.currentLocation = { lat: newLat, lng: newLng };

      // Update metrics
      walkingSession.steps = calculateSteps(walkingSession.distanceTraveled);
      walkingSession.calories = calculateCalories(walkingSession.distanceTraveled);
      walkingSession.progressPercentage = calculateProgress(
        walkingSession.distanceTraveled,
        walkingSession.route.distance
      );

      // Update map marker
      if (userMarker) {
        userMarker.setPosition({ lat: newLat, lng: newLng });
      }

      // Update UI
      updateWalkingMetrics();

      // Check arrival
      if (checkArrival(newLat, newLng,
        walkingSession.destination.location.lat,
        walkingSession.destination.location.lng)) {
        onArrival();
      }
    }

    function onPositionError(error) {
      console.error('Position tracking error:', error);
      showToast('位置情報エラー', '位置情報の更新に失敗しました。最後の位置を使用しています。', 'warning');
    }

    function updateWalkingMetrics() {
      document.getElementById('walk-steps').textContent = walkingSession.steps.toLocaleString();
      document.getElementById('walk-distance').textContent = (walkingSession.distanceTraveled / 1000).toFixed(1);
      document.getElementById('walk-calories').textContent = walkingSession.calories;

      const percent = Math.round(walkingSession.progressPercentage);
      document.getElementById('progress-percent').textContent = percent + '%';
      document.getElementById('progress-fill').style.width = percent + '%';

      const remaining = Math.max(0, walkingSession.route.distance - walkingSession.distanceTraveled);
      document.getElementById('dest-remaining').textContent = '残り ' + formatDistance(remaining);
    }

    function reroll() {
      if (!confirm('別の店に引き直しますか？')) return;

      // Stop tracking
      if (walkingSession.watchId !== null) {
        navigator.geolocation.clearWatch(walkingSession.watchId);
        walkingSession.watchId = null;
      }

      walkingSession.status = 'rerolled';
      showScreen('loading-screen');

      // Use current position for new search
      const loc = walkingSession.currentLocation || walkingSession.startLocation;
      walkingSession.startLocation = loc;
      searchChainStores(loc);
    }

    // ============================================
    // Arrival Screen Logic
    // ============================================
    function onArrival() {
      // Stop tracking
      if (walkingSession.watchId !== null) {
        navigator.geolocation.clearWatch(walkingSession.watchId);
        walkingSession.watchId = null;
      }

      walkingSession.status = 'completed';

      // Update statistics
      updateStatisticsFromSession(walkingSession);

      // Add conquest stamp
      const stamps = addConquestStamp(walkingSession.destination.name);

      // Show arrival screen
      showScreen('arrival-screen');

      document.getElementById('arrival-dest-name').textContent = walkingSession.destination.name + ' に到着！';

      // Generate share card
      const cardDataURL = generateShareCard({
        restaurantName: walkingSession.destination.name,
        distance: (walkingSession.distanceTraveled / 1000).toFixed(1),
        steps: walkingSession.steps.toLocaleString(),
        calories: walkingSession.calories
      });
      document.getElementById('share-card-img').src = cardDataURL;

      // Display stamps
      displayStamps(stamps);
    }

    function displayStamps(stamps) {
      const grid = document.getElementById('stamps-grid');
      grid.innerHTML = '';
      document.getElementById('stamps-total').textContent = stamps.totalUnique + ' 店';

      stamps.chains.forEach((chain, i) => {
        const stamp = document.createElement('span');
        stamp.className = 'stamp';
        if (chain.name === walkingSession.destination.name && chain.visitCount === 1) {
          stamp.classList.add('new');
        }
        stamp.textContent = chain.name;
        stamp.style.animationDelay = (i * 0.05) + 's';
        grid.appendChild(stamp);
      });
    }

    function retryAdventure() {
      showScreen('top-screen');
      displayStatistics();
    }

    // ============================================
    // Share Card Generation (Canvas API)
    // ============================================
    function generateShareCard(data) {
      const canvas = document.createElement('canvas');
      canvas.width = 1200;
      canvas.height = 630;
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = '#1A1814';
      ctx.fillRect(0, 0, 1200, 630);

      // Top accent bar
      const gradient = ctx.createLinearGradient(0, 0, 1200, 0);
      gradient.addColorStop(0, '#BA7517');
      gradient.addColorStop(1, '#FAC775');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 1200, 8);

      // Bottom accent bar
      ctx.fillRect(0, 622, 1200, 8);

      // Decorative circle
      ctx.beginPath();
      ctx.arc(1100, 100, 200, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(186, 117, 23, 0.06)';
      ctx.fill();

      // App title
      ctx.fillStyle = '#FAC775';
      ctx.font = '600 42px "Zen Antique", serif';
      ctx.fillText('彷徨える胃袋', 60, 90);

      // Subtitle line
      ctx.fillStyle = '#888780';
      ctx.font = '18px "Noto Sans JP", sans-serif';
      ctx.fillText('今日の冒険記録', 60, 125);

      // Separator line
      ctx.strokeStyle = 'rgba(250, 199, 117, 0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(60, 150);
      ctx.lineTo(1140, 150);
      ctx.stroke();

      // Restaurant name
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '600 36px "Noto Sans JP", sans-serif';
      ctx.fillText('🍜 ' + data.restaurantName, 60, 210);

      // Metrics labels
      ctx.fillStyle = '#888780';
      ctx.font = '18px "Noto Sans JP", sans-serif';
      ctx.fillText('歩いた距離', 60, 300);
      ctx.fillText('歩数', 440, 300);
      ctx.fillText('消費カロリー', 780, 300);

      // Metrics values
      ctx.fillStyle = '#FAC775';
      ctx.font = '600 72px "Zen Antique", serif';
      ctx.fillText(data.distance, 60, 390);
      ctx.fillText(data.steps, 440, 390);
      ctx.fillText(String(data.calories), 780, 390);

      // Metrics units
      ctx.fillStyle = '#888780';
      ctx.font = '24px "Noto Sans JP", sans-serif';

      const distWidth = ctx.measureText(data.distance).width;
      ctx.font = '600 72px "Zen Antique", serif';
      const distW = ctx.measureText(data.distance).width;
      ctx.font = '24px "Noto Sans JP", sans-serif';
      ctx.fillText('km', 60 + distW + 8, 390);

      const stepsW = ctx.measureText(data.steps).width;
      ctx.font = '600 72px "Zen Antique", serif';
      const stW = ctx.measureText(data.steps).width;
      ctx.font = '24px "Noto Sans JP", sans-serif';
      ctx.fillText('歩', 440 + stW + 8, 390);

      const calW2 = ctx.measureText(String(data.calories)).width;
      ctx.font = '600 72px "Zen Antique", serif';
      const calW = ctx.measureText(String(data.calories)).width;
      ctx.font = '24px "Noto Sans JP", sans-serif';
      ctx.fillText('kcal', 780 + calW + 8, 390);

      // Separator line
      ctx.strokeStyle = 'rgba(250, 199, 117, 0.2)';
      ctx.beginPath();
      ctx.moveTo(60, 440);
      ctx.lineTo(1140, 440);
      ctx.stroke();

      // Hashtags
      ctx.fillStyle = '#BA7517';
      ctx.font = '20px "Noto Sans JP", sans-serif';
      ctx.fillText('#彷徨える胃袋  #今日のチェーン旅', 60, 490);

      // Date
      const now = new Date();
      const dateStr = now.getFullYear() + '/' + (now.getMonth() + 1) + '/' + now.getDate();
      ctx.fillStyle = '#888780';
      ctx.font = '16px "Noto Sans JP", sans-serif';
      ctx.fillText(dateStr, 60, 580);

      // App branding
      ctx.fillStyle = 'rgba(250, 199, 117, 0.3)';
      ctx.font = '16px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('samayoeru-ibukuro.app', 1140, 580);
      ctx.textAlign = 'left';

      return canvas.toDataURL('image/png');
    }

    // ============================================

    function shareToX() {
      const text = `${walkingSession.destination.name}まで${(walkingSession.distanceTraveled / 1000).toFixed(1)}km歩きました！\n` +
                   `${walkingSession.steps.toLocaleString()}歩 / ${walkingSession.calories}kcal\n` +
                   `#彷徨える胃袋 #今日のチェーン旅`;

      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank', 'width=550,height=420');
    }

    // ============================================
    // Error Handling
    // ============================================
    function handleLocationError(error) {
      let title, message;
      switch (error.code) {
        case error.PERMISSION_DENIED:
          title = '位置情報の許可が必要です';
          message = 'このアプリは現在地を使用して近くのチェーン店を探します。ブラウザの設定で位置情報を許可してください。';
          break;
        case error.POSITION_UNAVAILABLE:
          title = '位置情報を取得できません';
          message = '現在地の取得に失敗しました。電波状況の良い場所でお試しください。';
          break;
        case error.TIMEOUT:
          title = '位置情報の取得がタイムアウトしました';
          message = 'もう一度お試しください。';
          break;
        default:
          title = '位置情報エラー';
          message = '不明なエラーが発生しました。';
      }
      showErrorModal(title, message);
      showScreen('top-screen');
    }

    function handleAPIError(status, apiName) {
      const messages = {
        'ZERO_RESULTS': 'ルートが見つかりませんでした。',
        'OVER_QUERY_LIMIT': 'APIの利用制限に達しました。しばらく待ってからお試しください。',
        'REQUEST_DENIED': 'APIキーが無効です。正しいキーを入力してください。',
        'UNKNOWN_ERROR': 'エラーが発生しました。'
      };

      const msg = messages[status] || messages['UNKNOWN_ERROR'];
      showErrorModal(apiName + ' エラー', msg + '\nもう一度お試しください。');

      if (status === 'REQUEST_DENIED') {
        clearAPIKey();
        showScreen('setup-screen');
      } else {
        showScreen('top-screen');
      }
    }

    function showErrorModal(title, message) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;
      document.getElementById('error-modal').classList.add('active');
    }

    function closeErrorModal(event) {
      if (event.target === document.getElementById('error-modal')) {
        document.getElementById('error-modal').classList.remove('active');
      }
    }

    function closeModal() {
      document.getElementById('error-modal').classList.remove('active');
    }

    function showToast(title, message, type = 'error') {
      const toast = document.getElementById('toast');
      document.getElementById('toast-title').textContent = title;
      document.getElementById('toast-message').textContent = message;

      toast.className = 'toast ' + (type === 'warning' ? 'warning' : '');
      setTimeout(() => toast.classList.add('visible'), 10);

      setTimeout(() => {
        toast.classList.remove('visible');
      }, 4000);
    }

    // ============================================
    // Google Maps API Loader
    // ============================================
    function loadGoogleMapsAPI(apiKey) {
      if (document.getElementById('google-maps-script')) return;

      const script = document.createElement('script');
      script.id = 'google-maps-script';
      script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places&callback=onMapsLoaded`;
      script.async = true;
      script.defer = true;
      script.onerror = () => {
        showErrorModal('Google Maps 読み込みエラー', 'Google Maps APIの読み込みに失敗しました。APIキーを確認してください。');
        clearAPIKey();
        showScreen('setup-screen');
      };
      document.head.appendChild(script);
    }

    function onMapsLoaded() {
      console.log('Google Maps API loaded successfully');
    }

    // Make callback globally available
    window.onMapsLoaded = onMapsLoaded;

    // ============================================
    // Offline / Online Detection
    // ============================================
    window.addEventListener('offline', () => {
      document.getElementById('offline-banner').classList.add('visible');
      const startBtn = document.getElementById('start-btn');
      if (startBtn) startBtn.disabled = true;
    });

    window.addEventListener('online', () => {
      document.getElementById('offline-banner').classList.remove('visible');
      const startBtn = document.getElementById('start-btn');
      if (startBtn) startBtn.disabled = false;
    });

    // ============================================
    // Service Worker Registration
    // ============================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registered:', reg.scope))
        .catch(err => console.log('Service Worker registration failed:', err));
    }

    // ============================================
    // App Initialization
    // ============================================
    // Pre-configured API key
    const PRESET_API_KEY = 'AIzaSyDuPTwqbGS6AK79lnThVKhWKJqJ_qStQEw';

    function initApp() {
      loadPreferences();

      let apiKey = getAPIKey();

      // Auto-set API key if not stored
      if (!apiKey && PRESET_API_KEY) {
        saveAPIKey(PRESET_API_KEY);
        apiKey = PRESET_API_KEY;
      }

      if (!apiKey) {
        showScreen('setup-screen');
      } else {
        loadGoogleMapsAPI(apiKey);
        showScreen('top-screen');
        displayStatistics();
      }

      // Restore slider and genre from preferences
      document.getElementById('walking-slider').value = walkingMinutes;
      updateSlider(walkingMinutes);

      const genreChips = document.querySelectorAll('.chip');
      genreChips.forEach(chip => {
        chip.classList.remove('selected');
        if (chip.dataset.genre === selectedGenre) {
          chip.classList.add('selected');
        }
      });
    }

    // Start app
    document.addEventListener('DOMContentLoaded', initApp);
